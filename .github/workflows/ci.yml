name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        workspace: [packages/shared-types, apps/backend, apps/storefront, apps/sync]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter="./${{ matrix.workspace }}" typecheck

  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        workspace: [packages/shared-types, apps/backend, apps/storefront, apps/sync]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter="./${{ matrix.workspace }}" lint

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        workspace: [packages/shared-types, apps/backend, apps/storefront, apps/sync]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter="./${{ matrix.workspace }}" test

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        workspace: [apps/backend, apps/storefront, apps/sync]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter="./${{ matrix.workspace }}" build
